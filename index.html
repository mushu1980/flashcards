<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashCards</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      collection,
      addDoc,
      getDocs,
      deleteDoc
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

    // ჩასვი შენი Firebase-ის მონაცემები
  const firebaseConfig = {
  apiKey: "AIzaSyB1H3f-x2LYF9WghhdnRureRJbsAcdmZ9U",
  authDomain: "my-flashcards-9892f.firebaseapp.com",
  projectId: "my-flashcards-9892f",
  storageBucket: "my-flashcards-9892f.firebasestorage.app",
  messagingSenderId: "90098328832",
  appId: "1:90098328832:web:9da8983c9a46fd1a0dffe5"
};
      authDomain: "PUT_YOUR_PROJECT.firebaseapp.com",
      projectId: "PUT_YOUR_PROJECT_ID",
      storageBucket: "PUT_YOUR_PROJECT.appspot.com",
      messagingSenderId: "PUT_YOUR_SENDER_ID",
      appId: "PUT_YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentCards = [];
    let currentIndex = 0;
    let flipped = false;
    let currentSetId = null;

    const $ = (id) => document.getElementById(id);

    function show(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      $(page).classList.add('active');
    }

    async function loadSets(userId) {
      const wrap = $('sets');
      wrap.innerHTML = '';

      const snapshot = await getDocs(collection(db, 'users', userId, 'sets'));

      snapshot.forEach(setDoc => {
        const data = setDoc.data();

        const card = document.createElement('div');
        card.className = 'set-card';
        card.innerHTML = `
          <div class="set-top">
            <div>
              <h3>${data.name}</h3>
              <p>${data.cards.length} / 100 ბარათი</p>
            </div>
            <button class="ghost-btn" data-id="${setDoc.id}">სწავლა</button>
          </div>
        `;

        card.querySelector('button').onclick = () => startStudy(data.cards, data.name, setDoc.id);
        wrap.appendChild(card);
      });
    }

    function startStudy(cards, title, id) {
      currentCards = cards;
      currentIndex = 0;
      currentSetId = id;
      $('studyTitle').textContent = title;
      showCard();
      show('studyPage');
    }

    function showCard() {
      const card = currentCards[currentIndex];
      flipped = false;

      $('counter').textContent = `${currentIndex + 1} / ${currentCards.length}`;
      $('flashcard').classList.remove('flipped');
      $('front').textContent = card.word;
      $('back').textContent = card.definition;
    }

    window.flipCard = () => {
      $('flashcard').classList.toggle('flipped');
      flipped = !flipped;
    };

    window.nextCard = () => {
      if (currentIndex < currentCards.length - 1) {
        currentIndex++;
        showCard();
      }
    };

    window.prevCard = () => {
      if (currentIndex > 0) {
        currentIndex--;
        showCard();
      }
    };

    window.openCreate = () => {
      $('setName').value = '';
      $('bulkInput').value = '';
      $('modal').classList.add('show');
    };

    window.closeCreate = () => $('modal').classList.remove('show');

    window.saveSet = async () => {
      const name = $('setName').value.trim();
      const lines = $('bulkInput').value.trim().split('\n').filter(Boolean);

      if (!name) return alert('შეიყვანე ნაკრების სახელი');
      if (lines.length === 0) return alert('შეიყვანე ბარათები');
      if (lines.length > 100) return alert('მაქსიმუმ 100 ბარათი');

      const cards = lines.map(line => {
        const parts = line.split(' - ');
        return {
          word: (parts[0] || '').trim(),
          definition: (parts[1] || '').trim()
        };
      });

      const user = auth.currentUser;
      await addDoc(collection(db, 'users', user.uid, 'sets'), {
        name,
        cards,
        createdAt: Date.now()
      });

      closeCreate();
      loadSets(user.uid);
    };

    window.login = async () => {
      const email = $('email').value.trim();
      const password = $('password').value.trim();

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch {
        try {
          await createUserWithEmailAndPassword(auth, email, password);
        } catch (e) {
          alert('შესვლა ვერ მოხერხდა');
        }
      }
    };

    window.logout = async () => {
      await signOut(auth);
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        $('userEmail').textContent = user.email;
        await loadSets(user.uid);
        show('homePage');
      } else {
        show('loginPage');
      }
    });
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #f7f4ff, #fff6fb);
      color: #2e2447;
      min-height: 100vh;
    }

    .page { display: none; }
    .page.active { display: block; }

    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-box, .modal-box {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 28px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(130,100,190,0.12);
    }

    h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .sub {
      color: #8b82a7;
      margin-bottom: 28px;
    }

    input, textarea {
      width: 100%;
      border: 1px solid #ddd5f2;
      background: white;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 15px;
      margin-bottom: 14px;
      font-family: inherit;
    }

    textarea {
      min-height: 220px;
      resize: vertical;
    }

    button {
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: .2s;
    }

    .main-btn {
      width: 100%;
      background: linear-gradient(135deg, #8b74ff, #a26dff);
      color: white;
      padding: 14px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
    }

    .main-btn:hover { transform: translateY(-2px); }

    .home {
      padding: 28px;
      max-width: 1100px;
      margin: auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .user-pill {
      background: rgba(255,255,255,0.75);
      padding: 12px 18px;
      border-radius: 999px;
      color: #6d628f;
    }

    .hero {
      background: linear-gradient(135deg, #8a76ff, #9d78ff);
      color: white;
      border-radius: 30px;
      padding: 34px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }

    .hero h2 { font-size: 34px; }

    .create-btn {
      background: white;
      color: #775cf4;
      padding: 14px 22px;
      border-radius: 18px;
      font-weight: 800;
    }

    .sets {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 18px;
    }

    .set-card {
      background: rgba(255,255,255,0.82);
      border-radius: 24px;
      padding: 20px;
      border: 1px solid rgba(220,210,255,0.8);
    }

    .set-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .set-card h3 { margin-bottom: 6px; }
    .set-card p { color: #8d84a9; }

    .ghost-btn {
      background: #ece7ff;
      color: #6f57f4;
      padding: 10px 14px;
      border-radius: 14px;
      font-weight: 700;
    }

    .study {
      min-height: 100vh;
      padding: 30px;
    }

    .study-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .back-btn {
      background: #ece7ff;
      padding: 12px 16px;
      border-radius: 16px;
      color: #6f57f4;
      font-weight: 700;
    }

    .card-wrap {
      max-width: 680px;
      margin: 40px auto;
      perspective: 1200px;
    }

    .flashcard {
      position: relative;
      width: 100%;
      height: 360px;
      transform-style: preserve-3d;
      transition: transform .6s;
      cursor: pointer;
    }

    .flashcard.flipped {
      transform: rotateY(180deg);
    }

    .side {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.85);
      border-radius: 30px;
      border: 1px solid rgba(221,212,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
      font-size: 38px;
      font-weight: 800;
      backface-visibility: hidden;
      box-shadow: 0 20px 50px rgba(123,102,185,0.08);
    }

    .back {
      transform: rotateY(180deg);
      font-size: 28px;
      color: #5d5379;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 28px;
    }

    .small-btn {
      background: white;
      border-radius: 16px;
      padding: 14px 20px;
      font-weight: 800;
      color: #6f57f4;
      border: 1px solid #ddd5f2;
    }

    .counter {
      font-size: 18px;
      color: #786f98;
      font-weight: 800;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(25, 17, 44, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 20;
    }

    .modal.show { display: flex; }

    .note {
      color: #867ca4;
      font-size: 14px;
      margin-top: 6px;
    }
  </style>
</head>
<body>

  <section id="loginPage" class="page login-page active">
    <div class="login-box">
      <h1>FlashCards</h1>
      <p class="sub">შედი ან შექმენი შენი ანგარიში</p>
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="პაროლი">
      <button class="main-btn" onclick="login()">შესვლა</button>
    </div>
  </section>

  <section id="homePage" class="page home">
    <div class="topbar">
      <div class="user-pill" id="userEmail"></div>
      <button class="ghost-btn" onclick="logout()">გასვლა</button>
    </div>

    <div class="hero">
      <div>
        <h2>შენი ბარათები</h2>
        <p>შექმენი რამდენიმე ნაკრები და ისწავლე მარტივად</p>
      </div>
      <button class="create-btn" onclick="openCreate()">+ ახალი ნაკრები</button>
    </div>

    <div id="sets" class="sets"></div>
  </section>

  <section id="studyPage" class="page study">
    <div class="study-head">
      <button class="back-btn" onclick="show('homePage')">← უკან</button>
      <h2 id="studyTitle"></h2>
    </div>

    <div class="card-wrap">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="side front" id="front"></div>
        <div class="side back" id="back"></div>
      </div>
    </div>

    <div class="controls">
      <button class="small-btn" onclick="prevCard()">← წინა</button>
      <div class="counter" id="counter"></div>
      <button class="small-btn" onclick="nextCard()">შემდეგი →</button>
    </div>
  </section>

  <div id="modal" class="modal">
    <div class="modal-box">
      <h2 style="margin-bottom:16px;">ახალი ნაკრები</h2>
      <input id="setName" placeholder="ნაკრების სახელი">
      <textarea id="bulkInput" placeholder="hello - გამარჯობა&#10;beautiful - ლამაზი&#10;book - წიგნი"></textarea>
      <div class="note">გამოიყენე ფორმატი: სიტყვა - განმარტება / მაქსიმუმ 100 ბარათი</div>
      <div style="display:flex; gap:12px; margin-top:20px;">
        <button class="ghost-btn" style="flex:1" onclick="closeCreate()">გაუქმება</button>
        <button class="main-btn" style="flex:1" onclick="saveSet()">შენახვა</button>
      </div>
    </div>
  </div>

</body>
</html>
